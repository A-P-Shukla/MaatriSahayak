AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MaatriSahayak - AI-Powered Maternal Emergency Response Platform

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: maatrisahayak
        LOG_LEVEL: INFO
        ENVIRONMENT: !Ref Environment

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

Resources:
  # ==================== API Gateway ====================
  MaatriSahayakApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"

  # ==================== Cognito User Pool ====================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
        - Name: phone_number
          AttributeDataType: String
          Mutable: true
        - Name: role
          AttributeDataType: String
          Mutable: true
        - Name: district
          AttributeDataType: String
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED

  # ==================== DynamoDB Tables ====================
  PregnanciesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: asha_worker_id
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: risk_level
          AttributeType: S
        - AttributeName: edd
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: asha-worker-index
          KeySchema:
            - AttributeName: asha_worker_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: district-risk-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: risk_level
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: delivery-date-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: edd
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  VitalSignsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: pregnancy_id
          AttributeType: S
        - AttributeName: recorded_at
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: pregnancy-events-index
          KeySchema:
            - AttributeName: pregnancy_id
              KeyType: HASH
            - AttributeName: recorded_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  EmergencyEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: pregnancy_id
          AttributeType: S
        - AttributeName: ambulance_id
          AttributeType: S
        - AttributeName: triggered_at
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: pregnancy-events-index
          KeySchema:
            - AttributeName: pregnancy_id
              KeyType: HASH
            - AttributeName: triggered_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ambulance-events-index
          KeySchema:
            - AttributeName: ambulance_id
              KeyType: HASH
            - AttributeName: triggered_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  AmbulancesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: district-status-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  HospitalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: district-type-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: type
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ASHAWorkersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: phone
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: district-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: phone-index
          KeySchema:
            - AttributeName: phone
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  DriversTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: phone
          AttributeType: S
        - AttributeName: ambulanceId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: phone-index
          KeySchema:
            - AttributeName: phone
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ambulance-index
          KeySchema:
            - AttributeName: ambulanceId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ==================== Lambda Layers ====================
  SharedDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      Description: Shared dependencies and utilities for MaatriSahayak Lambda functions
      ContentUri: ../lambda_functions/shared/
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: python3.12

  # ==================== Lambda Functions ====================
  RegisterPregnancyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/register_pregnancy/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register a new pregnancy in the system
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PregnanciesTable
      Events:
        RegisterPregnancy:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies
            Method: POST

  RecordVitalsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/record_vitals/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Record vital signs for a pregnancy
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
          PREGNANCIES_TABLE: !Ref PregnanciesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VitalSignsTable
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
      Events:
        RecordVitals:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /vitals
            Method: POST

  GetPregnancyDetailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/get_pregnancy_details/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Get detailed information about a pregnancy
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBReadPolicy:
            TableName: !Ref VitalSignsTable
      Events:
        GetPregnancyDetails:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies/{id}
            Method: GET

  ListPregnanciesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/list_pregnancies/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: List pregnancies with filtering and pagination
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
      Events:
        ListPregnancies:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies
            Method: GET

  TriggerEmergencyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/trigger_emergency/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Trigger emergency response workflow
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          EMERGENCY_EVENTS_TABLE: !Ref EmergencyEventsTable
          AMBULANCES_TABLE: !Ref AmbulancesTable
          HOSPITALS_TABLE: !Ref HospitalsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmergencyEventsTable
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AmbulancesTable
        - DynamoDBReadPolicy:
            TableName: !Ref HospitalsTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt SendNotificationsFunction.Arn
      Events:
        TriggerEmergency:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /emergency
            Method: POST

  FindNearestAmbulanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/find_nearest_ambulance/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Find nearest available ambulance
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          AMBULANCES_TABLE: !Ref AmbulancesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AmbulancesTable
      Events:
        FindNearestAmbulance:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /ambulances/nearest
            Method: POST

  UpdateAmbulanceLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/update_ambulance_location/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Update ambulance GPS location and status
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          AMBULANCES_TABLE: !Ref AmbulancesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AmbulancesTable
      Events:
        UpdateAmbulanceLocation:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /ambulances/{id}/location
            Method: PUT

  SendNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/send_notifications/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Send SMS and push notifications to stakeholders
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref EmergencyNotificationsTopic
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt EmergencyNotificationsTopic.TopicName
        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: "*"

  # ==================== User Management Functions ====================
  RegisterASHAFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/register_asha/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register ASHA worker account
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          ASHA_WORKERS_TABLE: !Ref ASHAWorkersTable
          SES_SENDER_EMAIL: noreply@maatrisahayak.in
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ASHAWorkersTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminDisableUser
              Resource: !GetAtt UserPool.Arn
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        RegisterASHA:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /asha/register
            Method: POST

  GetASHAProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/get_asha_profile/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Get ASHA worker profile details
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          ASHA_WORKERS_TABLE: !Ref ASHAWorkersTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ASHAWorkersTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
              Resource: !GetAtt UserPool.Arn
      Events:
        GetASHAProfile:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /asha/{id}
            Method: GET

  UpdateASHAProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/update_asha_profile/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Update ASHA worker profile
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          ASHA_WORKERS_TABLE: !Ref ASHAWorkersTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ASHAWorkersTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt UserPool.Arn
      Events:
        UpdateASHAProfile:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /asha/{id}
            Method: PUT

  LoginASHAFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/login_asha/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: ASHA worker login with Cognito
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          CLIENT_ID: !Ref UserPoolClient
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
                - cognito-idp:GetUser
              Resource: !GetAtt UserPool.Arn
      Events:
        LoginASHA:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /asha/login
            Method: POST

  RefreshTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/refresh_token/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Refresh authentication tokens
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          CLIENT_ID: !Ref UserPoolClient
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
              Resource: !GetAtt UserPool.Arn
      Events:
        RefreshToken:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /auth/refresh
            Method: POST

  UpdatePregnancyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/update_pregnancy/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Update pregnancy information
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PregnanciesTable
      Events:
        UpdatePregnancy:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies/{id}
            Method: PUT

  RecordANCVisitFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/record_anc_visit/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Record ANC visit details
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VitalSignsTable
      Events:
        RecordANCVisit:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /anc/visits
            Method: POST

  GetANCHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/get_anc_history/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Get ANC visit history for pregnancy
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBReadPolicy:
            TableName: !Ref VitalSignsTable
      Events:
        GetANCHistory:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies/{id}/anc-history
            Method: GET

  GetVitalsHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/get_vitals_history/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Get vitals timeline for pregnancy
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBReadPolicy:
            TableName: !Ref VitalSignsTable
      Events:
        GetVitalsHistory:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies/{id}/vitals-history
            Method: GET

  RegisterAmbulanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/register_ambulance/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register ambulance in system
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          AMBULANCES_TABLE: !Ref AmbulancesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AmbulancesTable
      Events:
        RegisterAmbulance:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /ambulances
            Method: POST

  RegisterHospitalFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/register_hospital/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register hospital in system
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          HOSPITALS_TABLE: !Ref HospitalsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HospitalsTable
      Events:
        RegisterHospital:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /hospitals
            Method: POST

  UpdateHospitalCapacityFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/update_hospital_capacity/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Update hospital bed availability
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          HOSPITALS_TABLE: !Ref HospitalsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HospitalsTable
      Events:
        UpdateHospitalCapacity:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /hospitals/{id}/capacity
            Method: PUT

  GetRiskTrendsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/get_risk_trends/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Time-series risk analysis
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBReadPolicy:
            TableName: !Ref VitalSignsTable
      Events:
        GetRiskTrends:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies/{id}/risk-trends
            Method: GET

  ValidateEmergencyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/validate_emergency/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Validate emergency request
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          EMERGENCY_EVENTS_TABLE: !Ref EmergencyEventsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBReadPolicy:
            TableName: !Ref EmergencyEventsTable

  DispatchAmbulanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/dispatch_ambulance/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Assign ambulance to emergency
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          AMBULANCES_TABLE: !Ref AmbulancesTable
          EMERGENCY_EVENTS_TABLE: !Ref EmergencyEventsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AmbulancesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EmergencyEventsTable

  AlertHospitalFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/alert_hospital/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Notify hospital of incoming patient
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          HOSPITALS_TABLE: !Ref HospitalsTable
          EMERGENCY_EVENTS_TABLE: !Ref EmergencyEventsTable
          SNS_TOPIC_ARN: !Ref EmergencyNotificationsTopic
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref HospitalsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EmergencyEventsTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt EmergencyNotificationsTopic.TopicName

