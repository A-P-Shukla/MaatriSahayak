      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DriversTable
      Events:
        ListDrivers:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /driver/list
            Method: GET

  RegisterDriverFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/register_driver/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register new ambulance driver
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          CLIENT_ID: !Ref UserPoolClient
          DRIVERS_TABLE: !Ref DriversTable
          AMBULANCES_TABLE: !Ref AmbulancesTable
          SES_SENDER_EMAIL: noreply@maatrisahayak.in
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DriversTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AmbulancesTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminDisableUser
              Resource: !GetAtt UserPool.Arn
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        RegisterDriver:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /driver/register
            Method: POST

