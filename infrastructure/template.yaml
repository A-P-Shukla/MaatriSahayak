AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MaatriSahayak - AI-Powered Maternal Emergency Response Platform

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: maatrisahayak
        LOG_LEVEL: INFO
        ENVIRONMENT: !Ref Environment

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

Resources:
  # ==================== API Gateway ====================
  MaatriSahayakApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub maatrisahayak-api-${Environment}
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"

  # ==================== Cognito User Pool ====================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub maatrisahayak-users-${Environment}
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
        - Name: phone_number
          AttributeDataType: String
          Mutable: true
        - Name: role
          AttributeDataType: String
          Mutable: true
        - Name: district
          AttributeDataType: String
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub maatrisahayak-client-${Environment}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED

  # ==================== DynamoDB Tables ====================
  PregnanciesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub maatrisahayak-pregnancies-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: asha_worker_id
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: risk_level
          AttributeType: S
        - AttributeName: edd
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: asha-worker-index
          KeySchema:
            - AttributeName: asha_worker_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: district-risk-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: risk_level
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: delivery-date-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: edd
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  VitalSignsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub maatrisahayak-vital-signs-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: pregnancy_id
          AttributeType: S
        - AttributeName: recorded_at
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: pregnancy-events-index
          KeySchema:
            - AttributeName: pregnancy_id
              KeyType: HASH
            - AttributeName: recorded_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  EmergencyEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub maatrisahayak-emergency-events-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: pregnancy_id
          AttributeType: S
        - AttributeName: ambulance_id
          AttributeType: S
        - AttributeName: triggered_at
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: pregnancy-events-index
          KeySchema:
            - AttributeName: pregnancy_id
              KeyType: HASH
            - AttributeName: triggered_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ambulance-events-index
          KeySchema:
            - AttributeName: ambulance_id
              KeyType: HASH
            - AttributeName: triggered_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  AmbulancesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub maatrisahayak-ambulances-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: district-status-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  HospitalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub maatrisahayak-hospitals-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: district-type-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: type
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ==================== Lambda Layers ====================
  SharedDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub maatrisahayak-shared-dependencies-${Environment}
      Description: Shared dependencies and utilities for MaatriSahayak Lambda functions
      ContentUri: ../lambda_functions/shared/
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: python3.12

  # ==================== Lambda Functions ====================
  RegisterPregnancyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-register-pregnancy-${Environment}
      CodeUri: ../lambda_functions/register_pregnancy/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register a new pregnancy in the system
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PregnanciesTable
      Events:
        RegisterPregnancy:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies
            Method: POST

  RecordVitalsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-record-vitals-${Environment}
      CodeUri: ../lambda_functions/record_vitals/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Record vital signs for a pregnancy
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
          PREGNANCIES_TABLE: !Ref PregnanciesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VitalSignsTable
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
      Events:
        RecordVitals:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /vitals
            Method: POST

  GetPregnancyDetailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-get-pregnancy-details-${Environment}
      CodeUri: ../lambda_functions/get_pregnancy_details/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Get detailed information about a pregnancy
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBReadPolicy:
            TableName: !Ref VitalSignsTable
      Events:
        GetPregnancyDetails:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies/{id}
            Method: GET

  ListPregnanciesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-list-pregnancies-${Environment}
      CodeUri: ../lambda_functions/list_pregnancies/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: List pregnancies with filtering and pagination
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
      Events:
        ListPregnancies:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /pregnancies
            Method: GET

  TriggerEmergencyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-trigger-emergency-${Environment}
      CodeUri: ../lambda_functions/trigger_emergency/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Trigger emergency response workflow
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          EMERGENCY_EVENTS_TABLE: !Ref EmergencyEventsTable
          AMBULANCES_TABLE: !Ref AmbulancesTable
          HOSPITALS_TABLE: !Ref HospitalsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmergencyEventsTable
        - DynamoDBReadPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AmbulancesTable
        - DynamoDBReadPolicy:
            TableName: !Ref HospitalsTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:maatrisahayak-send-notifications-${Environment}
      Events:
        TriggerEmergency:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /emergency
            Method: POST

  FindNearestAmbulanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-find-nearest-ambulance-${Environment}
      CodeUri: ../lambda_functions/find_nearest_ambulance/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Find nearest available ambulance
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          AMBULANCES_TABLE: !Ref AmbulancesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AmbulancesTable
      Events:
        FindNearestAmbulance:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /ambulances/nearest
            Method: POST

  UpdateAmbulanceLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-update-ambulance-location-${Environment}
      CodeUri: ../lambda_functions/update_ambulance_location/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Update ambulance GPS location and status
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          AMBULANCES_TABLE: !Ref AmbulancesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AmbulancesTable
      Events:
        UpdateAmbulanceLocation:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /ambulances/{id}/location
            Method: PUT

  SendNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-send-notifications-${Environment}
      CodeUri: ../lambda_functions/send_notifications/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Send SMS and push notifications to stakeholders
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref EmergencyNotificationsTopic
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt EmergencyNotificationsTopic.TopicName
        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: "*"

  # ==================== User Management Functions ====================
  RegisterASHAFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-register-asha-${Environment}
      CodeUri: ../lambda_functions/register_asha/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register ASHA worker account
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
              Resource: !GetAtt UserPool.Arn
      Events:
        RegisterASHA:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /asha/register
            Method: POST

  GetASHAProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-get-asha-profile-${Environment}
      CodeUri: ../lambda_functions/get_asha_profile/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Get ASHA worker profile details
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
              Resource: !GetAtt UserPool.Arn
      Events:
        GetASHAProfile:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /asha/{id}
            Method: GET

  UpdateASHAProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-update-asha-profile-${Environment}
      CodeUri: ../lambda_functions/update_asha_profile/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Update ASHA worker profile
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt UserPool.Arn
      Events:
        UpdateASHAProfile:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /asha/{id}
            Method: PUT

  RegisterAmbulanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-register-ambulance-${Environment}
      CodeUri: ../lambda_functions/register_ambulance/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register ambulance in system
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          AMBULANCES_TABLE: !Ref AmbulancesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AmbulancesTable
      Events:
        RegisterAmbulance:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /ambulances
            Method: POST

  RegisterHospitalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-register-hospital-${Environment}
      CodeUri: ../lambda_functions/register_hospital/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Register hospital in system
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          HOSPITALS_TABLE: !Ref HospitalsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HospitalsTable
      Events:
        RegisterHospital:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /hospitals
            Method: POST

  UpdateHospitalCapacityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-update-hospital-capacity-${Environment}
      CodeUri: ../lambda_functions/update_hospital_capacity/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Update hospital bed availability
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          HOSPITALS_TABLE: !Ref HospitalsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HospitalsTable
      Events:
        UpdateHospitalCapacity:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /hospitals/{id}/capacity
            Method: PUT

  # ==================== AI/ML Functions ====================
  AssessRiskFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-assess-risk-v2-${Environment}
      PackageType: Image
      Description: AI-powered risk assessment using FastAPI and Random Forest
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
          VITAL_SIGNS_TABLE: !Ref VitalSignsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PregnanciesTable
        - DynamoDBReadPolicy:
            TableName: !Ref VitalSignsTable
        - Statement:
            - Effect: Allow
              Action:
                - sagemaker:InvokeEndpoint
              Resource: "*"
      Events:
        AssessRisk:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /risk/assess/{pregnancy_id}
            Method: POST
    Metadata:
      Dockerfile: assess_risk/Dockerfile
      DockerContext: ../lambda_functions
      DockerTag: python3.12-v1

  AnalyzeSymptomsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-analyze-symptoms-${Environment}
      CodeUri: ../lambda_functions/analyze_symptoms/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: AI symptom analysis using Amazon Bedrock
      Timeout: 60
      MemorySize: 1024
      Layers:
        - !Ref SharedDependenciesLayer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        AnalyzeSymptoms:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /symptoms/analyze
            Method: POST

  ProcessANCCardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-process-anc-card-${Environment}
      CodeUri: ../lambda_functions/process_anc_card/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: OCR processing for ANC cards using Textract
      Timeout: 60
      MemorySize: 1024
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          PREGNANCIES_TABLE: !Ref PregnanciesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PregnanciesTable
        - Statement:
            - Effect: Allow
              Action:
                - textract:AnalyzeDocument
                - textract:DetectDocumentText
                - s3:GetObject
                - s3:PutObject
              Resource: "*"
      Events:
        ProcessANCCard:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /anc-card/process
            Method: POST

  # ==================== Ambulance & Location Functions ====================
  CheckHospitalCapacityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-check-hospital-capacity-${Environment}
      CodeUri: ../lambda_functions/check_hospital_capacity/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Check hospital bed availability
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          HOSPITALS_TABLE: !Ref HospitalsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref HospitalsTable
      Events:
        CheckHospitalCapacity:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /hospitals/capacity
            Method: GET

  GetAmbulanceRouteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub maatrisahayak-get-ambulance-route-${Environment}
      CodeUri: ../lambda_functions/get_ambulance_route/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: Calculate ambulance route and ETA
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
          AMBULANCES_TABLE: !Ref AmbulancesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AmbulancesTable
        - Statement:
            - Effect: Allow
              Action:
                - geo:CalculateRoute
              Resource: "*"
      Events:
        GetAmbulanceRoute:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /ambulances/{id}/route
            Method: POST

  EmergencyNotificationsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub maatrisahayak-emergency-notifications-${Environment}
      DisplayName: MaatriSahayak Emergency Notifications

  EmergencyWorkflowStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub maatrisahayak-emergency-workflow-${Environment}
      DefinitionUri: ../step_functions/emergency_workflow.asl.json
      DefinitionSubstitutions:
        TriggerEmergencyFunctionArn: !GetAtt TriggerEmergencyFunction.Arn
        FindNearestAmbulanceFunctionArn: !GetAtt FindNearestAmbulanceFunction.Arn
        SendNotificationsFunctionArn: !GetAtt SendNotificationsFunction.Arn
        UpdateAmbulanceLocationFunctionArn: !GetAtt UpdateAmbulanceLocationFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref TriggerEmergencyFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref FindNearestAmbulanceFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref SendNotificationsFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref UpdateAmbulanceLocationFunction
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MaatriSahayakApi
            Path: /emergency/workflow
            Method: POST

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${MaatriSahayakApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId

  PregnanciesTableName:
    Description: Pregnancies DynamoDB Table Name
    Value: !Ref PregnanciesTable
    Export:
      Name: !Sub ${AWS::StackName}-PregnanciesTable

  VitalSignsTableName:
    Description: Vital Signs DynamoDB Table Name
    Value: !Ref VitalSignsTable
    Export:
      Name: !Sub ${AWS::StackName}-VitalSignsTable

  EmergencyEventsTableName:
    Description: Emergency Events DynamoDB Table Name
    Value: !Ref EmergencyEventsTable
    Export:
      Name: !Sub ${AWS::StackName}-EmergencyEventsTable

  AmbulancesTableName:
    Description: Ambulances DynamoDB Table Name
    Value: !Ref AmbulancesTable
    Export:
      Name: !Sub ${AWS::StackName}-AmbulancesTable

  EmergencyWorkflowStateMachineArn:
    Description: Emergency Workflow State Machine ARN
    Value: !Ref EmergencyWorkflowStateMachine
    Export:
      Name: !Sub ${AWS::StackName}-EmergencyWorkflowStateMachine

  EmergencyNotificationsTopicArn:
    Description: Emergency Notifications SNS Topic ARN
    Value: !Ref EmergencyNotificationsTopic
    Export:
      Name: !Sub ${AWS::StackName}-EmergencyNotificationsTopic

  HospitalsTableName:
    Description: Hospitals DynamoDB Table Name
    Value: !Ref HospitalsTable
    Export:
      Name: !Sub ${AWS::StackName}-HospitalsTable
