  ListDriversFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_functions/list_drivers/
      Handler: handler.lambda_handler
      Runtime: python3.12
      Description: List all drivers (officer dashboard)
      Layers:
        - !Ref SharedDependenciesLayer
      Environment:
        Variables:
