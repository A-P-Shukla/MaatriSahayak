name: Test

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

env:
  PYTHON_VERSION: '3.13'

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pylint

      - name: Run Black formatter check
        run: |
          black --check lambda_functions/ scripts/ || true

      - name: Run Flake8
        run: |
          flake8 lambda_functions/ scripts/ --max-line-length=120 --ignore=E501,W503 || true

  validate-sam:
    name: Validate SAM Template
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SAM CLI
        run: |
          pip install aws-sam-cli

      - name: Validate SAM template
        run: |
          cd infrastructure
          sam validate

  test-lambda-functions:
    name: Test Lambda Functions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lambda_functions/shared/requirements.txt
          pip install pytest pytest-cov moto

      - name: Run unit tests
        run: |
          # Add unit tests when available
          echo "Unit tests will be added here"
          # pytest tests/ --cov=lambda_functions --cov-report=xml

      - name: Test imports
        run: |
          python -c "import sys; sys.path.insert(0, 'lambda_functions'); from shared import constants, utils, validators"

  test-scripts:
    name: Test Scripts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Test script imports
        run: |
          python -c "import boto3; import dotenv; import requests"

      - name: Validate script syntax
        run: |
          python -m py_compile scripts/*.py

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: |
          pip install bandit

      - name: Run security scan
        run: |
          bandit -r lambda_functions/ scripts/ -ll || true

  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety

      - name: Check for vulnerabilities
        run: |
          pip install -r lambda_functions/shared/requirements.txt
          pip install -r scripts/requirements.txt
          safety check || true

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, validate-sam, test-lambda-functions, test-scripts, security-scan, check-dependencies]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "### Test Results 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tests completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Jobs:**" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SAM Validation: ${{ needs.validate-sam.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lambda Tests: ${{ needs.test-lambda-functions.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Script Tests: ${{ needs.test-scripts.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Check: ${{ needs.check-dependencies.result }}" >> $GITHUB_STEP_SUMMARY
