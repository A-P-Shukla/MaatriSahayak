version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python dependencies for Lambda functions
  - package-ecosystem: "pip"
    directory: "/lambda_functions/shared"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
      - "lambda"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 10

  # Python dependencies for scripts
  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
      - "scripts"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 10
